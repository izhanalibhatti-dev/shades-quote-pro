name: Publish GitHub Pages Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-branch
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: |
          BASE_PATH="/${GITHUB_REPOSITORY#*/}"
          echo "Building GitHub Pages branch for ${BASE_PATH}"
          TSS_ROUTER_BASEPATH="${BASE_PATH}" VITE_BASE_PATH="${BASE_PATH}" npm run build
          node scripts/build-github-pages.mjs "${BASE_PATH}"

      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd dist/github-pages
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy GitHub Pages"
          git branch -M gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin gh-pages
