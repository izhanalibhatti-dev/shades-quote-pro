name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build GitHub Pages artifact
        run: |
          BASE_PATH="/${GITHUB_REPOSITORY#*/}"
          echo "Building GitHub Pages artifact for ${BASE_PATH}"
          TSS_ROUTER_BASEPATH="${BASE_PATH}" VITE_BASE_PATH="${BASE_PATH}" npm run build
          node scripts/build-github-pages.mjs "${BASE_PATH}"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Ensure Pages site exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          response_file="$(mktemp)"
          status="$(
            curl -sS -o "${response_file}" -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
              -d '{"build_type":"workflow"}'
          )"

          case "${status}" in
            201)
              echo "GitHub Pages site created in workflow mode."
              ;;
            409|422)
              echo "GitHub Pages site already exists or is already being configured."
              cat "${response_file}"
              ;;
            *)
              echo "GitHub Pages site setup failed with status ${status}."
              cat "${response_file}"
              exit 1
              ;;
          esac

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/github-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
